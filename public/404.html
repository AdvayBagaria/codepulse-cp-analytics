<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>CodePulse CP Analytics</title>
    <script>
      // Redirect all 404s to index.html for SPA routing on GitHub Pages
      // Preserve the path and query string so the client-side router can handle it
      (function () {
        var path = location.pathname.replace(/^\/[^/]+/, '');
        var search = location.search;
        var base = location.pathname.substring(0, location.pathname.indexOf(path));
        // If the request is already for index.html or a static asset, don't redirect
        if (
          path.indexOf('index.html') !== -1 ||
          path.match(/\.(js|css|png|jpg|jpeg|gif|svg|ico|json)$/i)
        ) {
          return;
        }
        // Redirect to index.html within the repository base
        location.replace(base + 'index.html' + search);
      })();
    </script>
  </head>
  <body></body>
</html>
